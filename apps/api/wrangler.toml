name = "complerer-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[dev]
port = 8787

# ── Shared bindings (all environments) ──────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "complerer-db"
database_id = "946f1f5e-421e-4dab-a685-d47884c220c4"

[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "complerer-evidence"

# ── Development ─────────────────────────────────────────────────────────────
# Secrets in dev come from .dev.vars (never committed)

[env.development.vars]
ENVIRONMENT = "development"
ALLOWED_ORIGIN = "http://localhost:5173"
APP_URL = "http://localhost:5173"

# ── Staging ─────────────────────────────────────────────────────────────────

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGIN = "https://staging.complerer.com"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "complerer-db-staging"
database_id = "946f1f5e-421e-4dab-a685-d47884c220c4"

[[env.staging.r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "complerer-evidence-staging"

# ── Production ──────────────────────────────────────────────────────────────
# Secrets are set via: wrangler secret put <NAME> --env production
#   - ANTHROPIC_API_KEY
#   - GEMINI_API_KEY

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://dash.complerer.com"
APP_URL = "https://dash.complerer.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "complerer-db"
database_id = "946f1f5e-421e-4dab-a685-d47884c220c4"

[[env.production.r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "complerer-evidence"
